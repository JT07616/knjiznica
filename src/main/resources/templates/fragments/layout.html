<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav class="main-nav" th:fragment="main-nav">
    <a th:href="@{/}" th:classappend="${activePage == 'home'} ? 'active'">Početna</a>
    <a th:href="@{/books}" th:classappend="${activePage == 'books'} ? 'active'">Knjige</a>
    <a th:href="@{/members}" th:classappend="${activePage == 'members'} ? 'active'">Članovi</a>
    <a th:href="@{/loans}" th:classappend="${activePage == 'loans'} ? 'active'">Posudbe</a>
</nav>

<div th:fragment="flash-message">
    <div class="alert success" th:if="${message}" th:text="${message}">
        Success message
    </div>
    <div class="alert error" th:if="${errorMessage}" th:text="${errorMessage}">
        Error message
    </div>
</div>
</body>
</html>
