<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Posudbe</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: main-nav}"></div>
<div th:replace="~{fragments/layout :: flash-message}"></div>

<h1>Popis posudbi</h1>

<p><a class="primary-link" th:href="@{/loans/new}">Dodaj novu posudbu</a></p>

<div class="filter-links">
    <a th:href="@{/loans}">Sve posudbe</a>
    <a th:href="@{/loans(status='ACTIVE')}">Aktivne posudbe</a>
    <a th:href="@{/loans(status='RETURNED')}">Vraćene posudbe</a>
</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Knjiga</th>
        <th>Član</th>
        <th>Datum posudbe</th>
        <th>Rok vraćanja</th>
        <th>Datum vraćanja</th>
        <th>Status</th>
        <th>Akcije</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="loan : ${loans}">
        <td th:text="${loan.id}">1</td>
        <td th:text="${loan.book.title}">Naslov knjige</td>
        <td th:text="|${loan.member.firstName} ${loan.member.lastName}|">Ime Prezime</td>
        <td th:text="${loan.loanDate}">2026-01-01</td>
        <td th:text="${loan.dueDate}">2026-01-15</td>
        <td th:text="${loan.returnDate != null ? loan.returnDate : '-'}">-</td>
        <td th:text="${loan.status}">ACTIVE</td>
        <td class="actions">
            <a th:href="@{/loans/{id}(id=${loan.id})}">Detalji</a>
            <a th:if="${loan.status == 'ACTIVE'}" th:href="@{/loans/{id}/edit(id=${loan.id})}">Uredi</a>

            <form th:if="${loan.status == 'ACTIVE'}"
                  th:action="@{/loans/{id}/return(id=${loan.id})}"
                  method="post"
                  style="display:inline;">
                <button type="submit">Označi kao vraćeno</button>
            </form>

            <form th:action="@{/loans/{id}/delete(id=${loan.id})}" method="post" style="display:inline;">
                <button type="submit">Obriši</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
