<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Uredi posudbu</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: main-nav}"></div>

<h1>Uredi posudbu</h1>

<form th:action="@{/loans/{id}(id=${loan.id})}" th:object="${loanForm}" method="post">
  <input type="hidden" th:field="*{bookId}">

  <div>
    <label>Knjiga:</label>
    <span th:text="${loan.book.title}">Naslov knjige</span>
  </div>

  <div>
    <label>Status:</label>
    <span th:text="${loan.status}">Aktivno</span>
  </div>

  <div>
    <label>&#268;lan:</label>
    <select th:field="*{memberId}" th:errorclass="is-invalid">
      <option value="">-- Odaberi člana --</option>
      <option th:each="member : ${members}"
              th:value="${member.id}"
              th:text="|${member.firstName} ${member.lastName} (${member.email})|">
        Član
      </option>
    </select>
    <p class="field-error" th:if="${#fields.hasErrors('memberId')}" th:errors="*{memberId}">
      Greška
    </p>
  </div>

  <button type="submit">Spremi</button>
  <a class="button-link" th:href="@{/loans}">Povratak na popis</a>
</form>
</body>
</html>
