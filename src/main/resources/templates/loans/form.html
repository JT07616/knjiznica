<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dodaj posudbu</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: main-nav}"></div>

<h1>Dodaj posudbu</h1>

<form th:action="@{/loans}" th:object="${loanForm}" method="post">
    <div class="alert error" th:if="${#fields.hasAnyErrors()}">
        <p th:each="err : ${#fields.allErrors()}" th:text="${err}">Greška</p>
    </div>

    <div>
        <label>Knjiga</label>
        <select th:field="*{bookId}" th:errorclass="is-invalid">
            <option value="">-- Odaberi knjigu --</option>
            <option th:each="book : ${books}"
                    th:value="${book.id}"
                    th:text="|${book.title} - ${book.author}|">
                Knjiga
            </option>
        </select>
        <p class="field-error" th:if="${#fields.hasErrors('bookId')}" th:errors="*{bookId}">
            Greska
        </p>
    </div>

    <div>
        <label>Clan</label>
        <select th:field="*{memberId}" th:errorclass="is-invalid">
            <option value="">-- Odaberi člana --</option>
            <option th:each="member : ${members}"
                    th:value="${member.id}"
                    th:text="|${member.firstName} ${member.lastName} (${member.email})|">
                Član
            </option>
        </select>
        <p class="field-error" th:if="${#fields.hasErrors('memberId')}" th:errors="*{memberId}">
            Greška
        </p>
    </div>

    <button type="submit">Spremi</button>
</form>

<p><a th:href="@{/loans}">Povratak na popis</a></p>
</body>
</html>
